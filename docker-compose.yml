services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: kvrocks-manager-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Please set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: kvrocks_manager
      MYSQL_USER: kvrocks
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Please set MYSQL_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kvrocks-network

  # Redis (for caching)
  redis:
    image: redis:7-alpine
    container_name: kvrocks-manager-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kvrocks-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kvrocks-manager-backend
    restart: unless-stopped
    environment:
      - DEBUG=false
      - DATABASE_URL=mysql+aiomysql://kvrocks:${MYSQL_PASSWORD}@mysql:3306/kvrocks_manager
      - SECRET_KEY=${SECRET_KEY:?Please set SECRET_KEY in .env}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - kvrocks-network

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kvrocks-manager-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kvrocks-network

volumes:
  mysql_data:
  redis_data:

networks:
  kvrocks-network:
    driver: bridge
