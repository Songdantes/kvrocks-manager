upstream kvrocks_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.example.com;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Frontend static files - 确保路径正确
    root /opt/kvrocks-manager/frontend/dist;
    index index.html index.htm;

    # API proxy
    location /api {
        proxy_pass http://kvrocks_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://kvrocks_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback - 修复循环重定向问题
    location / {
        try_files $uri $uri/ @fallback;
    }

    location @fallback {
        rewrite ^ /index.html break;
    }

    # 确保 index.html 可以直接访问
    location = /index.html {
        root /opt/kvrocks-manager/frontend/dist;
        internal;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/kvrocks-manager-access.log;
    error_log /var/log/nginx/kvrocks-manager-error.log;
}
